services:
  - type: web
    name: domainforge-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: APP_ENV
        value: production
      - key: MOCK_LLM
        value: "true"
      - key: RETRIEVER_MODE
        value: memory
      - key: CORS_ORIGINS
        value: https://domainforge-rag-peft.vercel.app,https://venkat-ai.com
      - key: DOMAINFORGE_API_KEY
        generateValue: true
