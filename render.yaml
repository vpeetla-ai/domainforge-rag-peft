services:
  - type: web
    name: domainforge-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: DEFAULT_DATA_CLASS
        value: internal
      - key: AGENTFINOPS_API_KEY
        sync: false
      - key: AGENTFINOPS_URL
        value: https://agent-finops-api.onrender.com
      - key: LLM_GATEWAY_TENANT_ID
        value: domainforge-rag-peft
      - key: LLM_GATEWAY_API_KEY
        sync: false
      - key: LLM_GATEWAY_URL
        value: https://aegis-llm-gateway-api.onrender.com/v1
      - key: APP_ENV
        value: production
      - key: MOCK_LLM
        value: "true"
      - key: RETRIEVER_MODE
        value: memory
      - key: CORS_ORIGINS
        value: https://domainforge-rag-peft.vercel.app,https://venkat-ai.com
      - key: DOMAINFORGE_API_KEY
        generateValue: true
